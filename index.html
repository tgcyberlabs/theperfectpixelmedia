<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Media Landing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

/* Background media */

.hero{
    width:100vw;
    height:100vh;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Burger */

.burger{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;

    width:45px;
    height:45px;

    border:none;
    border-radius:10px;

    background:rgba(0,0,0,.5);
    backdrop-filter:blur(10px);

    cursor:pointer;

    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:5px;

    padding:10px;
}

.burger span{
    height:3px;
    width:100%;
    background:white;
    border-radius:20px;
}

/* Drawer */

.drawer{
    position:fixed;
    left:-320px;
    top:0;

    width:300px;
    height:100vh;

    background:#111;

    z-index:999;

    transition:.35s ease;

    padding:80px 25px;
}

.drawer.open{
    left:0;
}

.drawer h2{
    color:white;
    margin-bottom:20px;
}

.drawer p,
.drawer a{
    color:#ddd;
    line-height:1.8;
    text-decoration:none;
}

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    opacity:0;
    visibility:hidden;

    transition:.3s;

    z-index:998;
}

.overlay.show{
    opacity:1;
    visibility:visible;
}

/* Small touch improvements */

@media(max-width:768px){
    .drawer{
        width:85%;
    }
}
</style>
</head>

<body>

<button class="burger" id="burger">
    <span></span>
    <span></span>
    <span></span>
</button>

<div class="drawer" id="drawer">
    <h2>Contact</h2>

    <p>Email:</p>
    <a href="mailto:theperfectpixelmedia@gmail.com">
        theperfectpixelmedia@gmail.com
    </a>

    <br><br>

    <p>Phone:</p>
    <a href="tel:+9186081 11786">
        +91 86081 11786
    </a>

    <br><br>

    <p>Instagram:</p>
    <a href="https://www.instagram.com/the.perfect.pixel.media/" target="blank"> 
        @theperfectpixelmedia
    </a>
</div>

<div class="overlay" id="overlay"></div>

<section class="hero">
    <video
        id="heroVideo"
        autoplay
        muted
        loop
        playsinline
        preload="auto">
    </video>
</section>

<script>

const video = document.getElementById("heroVideo");

const sources = {
    portrait: "2.mp4",
    landscape: "1.mp4"
};

function updateMedia(){

    const portrait =
        window.innerHeight >
        window.innerWidth;

    const newSrc =
        portrait
        ? sources.portrait
        : sources.landscape;

    if(video.src.includes(newSrc))
        return;

    const currentTime = video.currentTime || 0;

    video.src = newSrc;

    video.addEventListener(
        "loadedmetadata",
        () => {
            video.currentTime =
                Math.min(
                    currentTime,
                    video.duration || 0
                );

            video.play();
        },
        { once:true }
    );
}

updateMedia();

window.addEventListener(
    "resize",
    updateMedia
);

window.addEventListener(
    "orientationchange",
    updateMedia
);

/* Drawer */

const burger =
document.getElementById("burger");

const drawer =
document.getElementById("drawer");

const overlay =
document.getElementById("overlay");

burger.onclick = () => {
    drawer.classList.toggle("open");
    overlay.classList.toggle("show");
};

overlay.onclick = () => {
    drawer.classList.remove("open");
    overlay.classList.remove("show");
};

</script>

</body>
</html>
